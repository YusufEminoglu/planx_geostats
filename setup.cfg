[flake8]
# PEP 8 changed: line breaks BEFORE binary operators are now preferred
# (Knuth style). W503 still flags this by default; we explicitly opt out.
# W504 (line break AFTER binary op) stays enabled — pick one and be consistent.
# E203 conflicts with Black-style slicing whitespace; disabled for parity.
extend-ignore = W503, E203
max-line-length = 120
exclude =
    .git,
    __pycache__,
    .idea,
    .vscode,
    venv,
    .venv,
    tests
